<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premios de Aventurero — EcoScanner Adventures</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="app-container">
    <div class="page" style="padding-bottom: calc(var(--nav-h) + 8px);">
    
    <div class="content">
      <div class="flex items-c gap-3 mb-2 anim-fadeInDown">
        <div style="background: var(--adventure-amber); padding: 8px; border-radius: 12px; font-size: 24px; color: white; display: flex; align-items: center;">
          <i class='bx bxs-gift'></i>
        </div>
        <h1 class="t-2xl fw-9 c-dark" style="line-height: 1.1;">Premios de Aventurero</h1>
      </div>
      <p class="c-mid t-sm mb-4 fw-6 anim-fadeInDown delay-1">
        Tus hazañas en el parque te otorgan recompensas reales.
      </p>

      <div class="sticky top-0 z-10 py-2 bg-app anim-scaleIn delay-2" style="position: sticky; top: -16px; background: var(--bg-app); padding-top: 16px; padding-bottom: 16px; z-index: 10;">
        <div class="inline-flex items-c gap-2 px-4 py-2 bg-primary text-white rounded-full shadow-primary" style="background: linear-gradient(135deg, var(--adventure-gold), var(--adventure-amber)); color: white; border-radius: 999px; font-weight: 800; box-shadow: 0 4px 12px rgba(255,184,48,0.4);">
          <i class='bx bxs-star' style="font-size: 18px;"></i>
          <span id="user-pts" style="font-size: 16px;">0 pts</span>
        </div>
      </div>

      <!-- Categories Filter -->
      <div class="flex gap-2 overflow-x-auto pb-2 mt-2 hide-scrollbar anim-slideUp delay-3" style="overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none;">
        <div class="badge px-3 py-2" style="background: var(--adventure-gold); color: white; font-size: 13px;">Todos</div>
        <div class="badge badge-primary px-3 py-2" style="font-size: 13px;">Comida</div>
        <div class="badge badge-purple px-3 py-2" style="font-size: 13px;">Fast Pass</div>
        <div class="badge badge-orange px-3 py-2" style="font-size: 13px;">Merch</div>
      </div>

      <!-- Rewards Grid -->
      <div class="flex flex-col gap-4 mt-4 pb-4" id="rewards-container">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Modal Confirmación -->
  <div id="redeem-modal" class="modal-overlay hidden">
    <div class="modal-sheet tc" style="padding-bottom: 40px;">
      <button class="modal-close-btn" id="btn-close-redeem">×</button>
      <div class="modal-handle"></div>
      <div id="modal-icon" style="font-size: 64px; margin-bottom: 16px; color: var(--adventure-gold);"><i class='bx bxs-gift'></i></div>
      <h2 class="t-xl fw-9 c-dark mb-2" id="modal-title">Canjear Premio</h2>
      <p class="c-mid t-base mb-2 fw-6" id="modal-desc">¿Confirmas el canjeo por <span id="modal-cost" class="c-dark fw-8">0</span> pts?</p>
      <p class="t-sm fw-7 c-primary mb-6" id="modal-post-pts">Te quedarán 0 pts.</p>
      
      <div class="flex gap-3">
        <button class="btn btn-secondary flex-1" id="btn-cancel">Cancelar</button>
        <button class="btn btn-primary flex-1" id="btn-confirm" style="background: var(--adventure-gold); color: white; border: none;">Canjear</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <i class='bx bx-home-alt'></i>
      <span>Inicio</span>
    </a>
    <a href="dashboard.html" class="nav-item" id="nav-ranking">
      <i class='bx bx-trophy'></i>
      <span>Ranking</span>
    </a>
    <a href="aventura.html" class="nav-item" id="nav-aventura">
      <i class='bx bx-compass'></i>
      <span>Aventura</span>
    </a>
    <a href="marketplace.html" class="nav-item active" id="nav-marketplace">
      <i class='bx bx-gift'></i>
      <span>Premios</span>
    </a>
    <a href="profile.html" class="nav-item" id="nav-profile">
      <i class='bx bx-user'></i>
      <span>Perfil</span>
    </a>
  </nav>
  </div> <!-- app-container -->

  <script src="js/app.js"></script>
  <script src="js/confetti.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Fix Nav highlighting since we replaced Map with Adventure on the main flow
      const navs = document.querySelectorAll('.nav-item');
      navs.forEach(n => n.classList.remove('active'));
      document.getElementById('nav-marketplace').classList.add('active');

      const ptsEl = document.getElementById('user-pts');
      
      function updatePts() {
        ptsEl.textContent = `${EcoApp.getPoints()} pts`;
      }
      updatePts();

      const container = document.getElementById('rewards-container');
      const catalog = EcoApp.getCatalog();
      let selectedReward = null;

      const modal = document.getElementById('redeem-modal');
      const mTitle = document.getElementById('modal-title');
      const mCost = document.getElementById('modal-cost');
      const mIcon = document.getElementById('modal-icon');
      const mPostPts = document.getElementById('modal-post-pts');
      const btnCloseRedeem = document.getElementById('btn-close-redeem');

      function renderCatalog() {
        container.innerHTML = '';
        const userPts = EcoApp.getPoints();

        catalog.forEach((item, i) => {
          const canAfford = userPts >= item.cost;
          const el = document.createElement('div');
          el.className = `reward-card anim-slideUp delay-${(i%5)+2}`;
          
          let btnClass = 'btn-primary';
          if (!canAfford) btnClass = 'btn-secondary btn-disabled';
          
          let btnText = '<i class="bx bxs-zap" style="font-size: 18px;"></i> Canjear';
          if (EcoApp.getState().redeemedIds.includes(item.id)) {
            btnClass = 'btn-secondary btn-disabled';
            btnText = '<i class="bx bx-check"></i> Canjeado';
          }

          let colorOverride = item.color;
          if(item.id === 'r1') colorOverride = 'linear-gradient(135deg, #10B981, #047857)';
          if(item.id === 'r2') colorOverride = 'linear-gradient(135deg, #8B5CF6, #6D28D9)';
          if(item.id === 'r3') colorOverride = 'linear-gradient(135deg, #F59E0B, #D97706)';
          if(item.id === 'r4') colorOverride = 'linear-gradient(135deg, #3B82F6, #1D4ED8)';

          el.innerHTML = `
            <div class="reward-card-banner" style="background: ${colorOverride};">
              <div class="reward-icon" style="font-size: 40px; color: white; opacity: 0.9;">${item.icon}</div>
              <div class="reward-cat-tag" style="text-transform: capitalize;">${item.category}</div>
            </div>
            <div class="reward-body">
              <div class="reward-title">${item.title}</div>
              <div class="reward-desc">${item.desc}</div>
              <div class="reward-footer">
                <div class="reward-cost">
                  <i class='bx bxs-star' style="color: var(--adventure-gold); font-size: 18px;"></i>
                  <span style="font-size: 18px; color: ${canAfford ? 'var(--text-dark)' : 'var(--text-muted)'}; font-weight: 800;">${item.cost}</span>
                  <span style="font-size: 12px; font-weight: 600; color: var(--text-mid);">pts</span>
                </div>
                <button class="btn ${btnClass} btn-sm redeem-btn" data-id="${item.id}" style="padding: 10px 20px; ${canAfford && !EcoApp.getState().redeemedIds.includes(item.id) ? 'background: var(--adventure-gold); color: white; border: none;' : ''}">
                  ${btnText}
                </button>
              </div>
            </div>
          `;
          container.appendChild(el);
        });

        document.querySelectorAll('.redeem-btn:not(.btn-disabled)').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            selectedReward = catalog.find(r => r.id === id);
            mTitle.textContent = selectedReward.title;
            mCost.textContent = selectedReward.cost;
            mIcon.textContent = selectedReward.icon;
            mPostPts.textContent = `Te quedarán ${userPts - selectedReward.cost} pts.`;
            modal.classList.remove('hidden');
          });
        });
      }

      renderCatalog();

      const closeModal = () => {
        modal.classList.add('hidden');
        selectedReward = null;
      };

      document.getElementById('btn-cancel').addEventListener('click', closeModal);
      btnCloseRedeem.addEventListener('click', closeModal);

      document.getElementById('btn-confirm').addEventListener('click', () => {
        if (selectedReward && EcoApp.spendPoints(selectedReward.cost)) {
          EcoApp.getState().redeemedIds.push(selectedReward.id);
          EcoApp.save();
          modal.classList.add('hidden');
          Confetti.fire(); // Assuming confetti exists
          updatePts();
          renderCatalog();
        }
      });
    });
  </script>
</body>
</html>
