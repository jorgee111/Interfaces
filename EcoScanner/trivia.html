<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anti-Cola Games — EcoScanner</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="app-container">
    <div class="page" style="height: 100vh;">
      <div class="top-bar anim-fadeInDown">
        <button class="btn-ghost" style="border: none; padding: 8px; font-size: 24px;" onclick="history.back()">
          <i class='bx bx-chevron-left' style="color: var(--text-dark);"></i>
        </button>
        <div class="top-bar-title" style="flex: 1; text-align: center; margin-right: 36px;">Anti-Cola Games 🎮</div>
      </div>

      <div class="content pt-0 flex flex-col justify-c" style="flex: 1; padding: var(--sp-4);">
        
        <!-- Stats Bar -->
        <div class="flex items-c justify-b mb-6 anim-fadeInDown delay-1 px-2">
          <div class="tc">
            <div class="t-xs fw-7 c-mid uppercase">Racha</div>
            <div class="t-md fw-9" style="color: var(--adventure-amber);" id="trivia-streak">0 🔥</div>
          </div>
          <div style="width: 1px; height: 24px; background: rgba(0,0,0,0.1);"></div>
          <div class="tc">
            <div class="t-xs fw-7 c-mid uppercase">Respondidas</div>
            <div class="t-md fw-9 c-dark" id="trivia-answered">0/18</div>
          </div>
          <div style="width: 1px; height: 24px; background: rgba(0,0,0,0.1);"></div>
          <div class="tc">
            <div class="t-xs fw-7 c-mid uppercase">Correctas</div>
            <div class="t-md fw-9 c-primary" id="trivia-correct">0</div>
          </div>
        </div>

        <div id="question-container" class="anim-scaleIn delay-2">
          <div class="tc mb-4">
            <div class="badge-adventure mb-3 mx-auto" id="q-category" style="background: rgba(124, 92, 252, 0.15); color: var(--quest-purple); border: none;">Naturaleza</div>
            <h2 class="t-xl fw-9 c-dark" id="q-text">Cargando pregunta...</h2>
          </div>

          <div class="flex flex-col gap-3" id="answers-container">
            <!-- Buttons injected here -->
          </div>
        </div>

        <!-- Result Overlay -->
        <div id="result-overlay" class="hidden tc anim-scaleIn" style="margin-top: 24px;">
          <div class="t-2xl mb-2" id="res-icon" style="font-size: 64px;"></div>
          <h3 class="t-xl fw-9 c-dark" id="res-title"></h3>
          
          <div class="card card-padded mt-3 mb-4" style="background: rgba(0,0,0,0.03); border: none;">
            <div class="flex items-c gap-2 justify-c mb-2">
              <i class='bx bx-bulb' style="color: var(--adventure-gold); font-size: 20px;"></i>
              <span class="t-sm fw-8 c-dark">¿Sabías que...?</span>
            </div>
            <p class="c-mid t-sm fw-6" id="res-desc"></p>
          </div>

          <div id="streak-bonus" class="hidden badge-adventure mx-auto mb-4 anim-evolution" style="background: linear-gradient(135deg, var(--adventure-gold), var(--adventure-amber)); color: white;">
            🔥 ¡Racha de 3! +15 pts bonus
          </div>

          <button class="btn btn-primary w-full" id="btn-next-question">Siguiente Pregunta</button>
        </div>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/confetti.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let currentQuestion = null;

      function updateStats() {
        const stats = EcoApp.getTriviaStats();
        document.getElementById('trivia-streak').textContent = `${stats.streak} 🔥`;
        document.getElementById('trivia-answered').textContent = `${stats.answered}/${stats.total}`;
        document.getElementById('trivia-correct').textContent = stats.correct;
      }

      function loadNextQuestion() {
        document.getElementById('result-overlay').classList.add('hidden');
        document.getElementById('streak-bonus').classList.add('hidden');
        document.getElementById('question-container').classList.remove('hidden');
        
        currentQuestion = EcoApp.getRandomQuestion();
        
        document.getElementById('q-category').textContent = currentQuestion.category.toUpperCase();
        document.getElementById('q-text').textContent = currentQuestion.question;
        
        const ansContainer = document.getElementById('answers-container');
        ansContainer.innerHTML = currentQuestion.options.map((opt, idx) => `
          <button class="btn btn-ghost w-full" style="padding: 16px; font-size: 16px; border: 2px solid var(--primary-light); text-align: left; justify-content: flex-start; color: var(--text-dark);" onclick="handleAnswer(${idx})">
            <span style="font-weight: 800; margin-right: 8px; color: var(--primary);">
              ${['A', 'B', 'C'][idx]})
            </span> 
            ${opt}
          </button>
        `).join('');

        updateStats();
      }

      window.handleAnswer = (selectedIndex) => {
        document.getElementById('question-container').classList.add('hidden');
        const res = document.getElementById('result-overlay');
        res.classList.remove('hidden');
        
        const result = EcoApp.answerQuestion(currentQuestion.id, selectedIndex);
        updateStats();
        
        document.getElementById('res-desc').textContent = result.funFact;

        if (result.correct) {
          document.getElementById('res-icon').innerHTML = "<i class='bx bxs-party' style='color: var(--primary);'></i>";
          document.getElementById('res-title').textContent = "¡Correcto!";
          document.getElementById('res-title').style.color = "var(--primary)";
          Confetti.fire();

          if (result.streak > 0 && result.streak % 3 === 0) {
            const streakEl = document.getElementById('streak-bonus');
            streakEl.textContent = `🔥 ¡Racha de ${result.streak}! +15 pts bonus`;
            streakEl.classList.remove('hidden');
          }
        } else {
          document.getElementById('res-icon').innerHTML = "<i class='bx bx-x-circle' style='color: var(--red);'></i>";
          document.getElementById('res-title').textContent = "¡Uy! Casi.";
          document.getElementById('res-title').style.color = "var(--red)";
        }
      };

      document.getElementById('btn-next-question').addEventListener('click', loadNextQuestion);

      // Initialize
      loadNextQuestion();
    });
  </script>
</body>
</html>
