<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EcoScanner - Misiones Diarias</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  <div class="app-container">
    <div class="page">
    
    <!-- Top Bar with Back Button -->
    <div class="top-bar anim-fadeInDown">
      <button class="btn-ghost" style="border: none; padding: 8px; font-size: 24px;" onclick="history.back()">
        <i class='bx bx-chevron-left' style="color: var(--text-dark);"></i>
      </button>
      <div class="top-bar-title" style="flex: 1; text-align: center; margin-right: 36px;">Misiones IA</div>
    </div>

    <div class="content pt-0">
      
      <!-- Streaks -->
      <div class="flex items-c justify-c mb-6 anim-scaleIn">
        <div class="streak-badge">
          <i class='bx bxs-flame' style="font-size: 20px;"></i> 
          <span>¡Racha de 3 días seguidos!</span>
        </div>
      </div>

      <p class="tc c-mid t-sm mb-5 fw-6 anim-fadeInDown delay-1 px-4">
        Estas misiones han sido generadas específicamente para ti basándonos en tu ubicación en el parque.
      </p>

      <div class="flex flex-col gap-4" id="all-missions-container">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
  </div> <!-- app-container -->

  <script src="js/app.js"></script>
  <script src="js/confetti.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('all-missions-container');
      const missions = EcoApp.getMissions();
      
      missions.forEach((m, i) => {
        const el = document.createElement('div');
        el.className = `card p-4 anim-slideUp delay-${(i%5)+2}`;
        if (m.progress >= m.total) el.style.opacity = '0.6';
        
        let actionBtn = '';
        if (m.progress < m.total) {
          actionBtn = `<button class="btn btn-primary btn-sm mt-3 w-full" onclick="location.href='index.html'">Completar Misión</button>`;
        } else {
          actionBtn = `<div class="mt-3 tc t-sm fw-8" style="color: var(--green2);">¡Misión Completada! ✓</div>`;
        }

        el.innerHTML = `
          <div class="flex items-c justify-b mb-3">
            <div class="flex items-c gap-3">
              <div class="mission-icon-wrap" style="width: 40px; height: 40px; font-size: 24px;">${m.icon}</div>
              <div class="t-base fw-8 c-dark">${m.title}</div>
            </div>
            <div class="t-md fw-9 c-primary">+${m.pts}</div>
          </div>
          <p class="t-sm c-mid mb-3">${m.desc}</p>
          <div class="flex items-c justify-b t-xs fw-7 c-muted mb-1">
            <span>Progreso</span>
            <span>${m.progress}/${m.total}</span>
          </div>
          <div class="prog-bar-wrap" style="height: 6px;">
            <div class="prog-bar-fill prog-bar-fill-primary" style="width: ${(m.progress/m.total)*100}%;"></div>
          </div>
          <div class="t-xs c-orange fw-7 mt-2 text-right">⏱ Expira: ${m.expires}</div>
          ${actionBtn}
        `;
        container.appendChild(el);
      });
    });
  </script>
</body>
</html>
