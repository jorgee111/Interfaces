<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mapa de Aventura — EcoScanner Adventures</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body style="overflow: hidden;">
  <div class="app-container">
    <div class="page" style="height: 100vh;">
    
    <!-- Floating Header Over Map -->
    <div style="position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: var(--sp-4);">
      <div class="card p-3 flex items-c justify-b shadow-md anim-fadeInDown">
        <button class="btn-ghost" style="border: none; padding: 4px; font-size: 24px;" onclick="history.back()">
          <i class='bx bx-chevron-left' style="color: var(--text-dark);"></i>
        </button>
        <div class="t-base fw-8 c-dark">Mapa de Aventura</div>
        <div class="badge-adventure" style="padding: 4px 8px; font-size: 10px;"><i class='bx bxs-circle' style="font-size: 8px;"></i> En vivo</div>
      </div>
      
      <!-- Info Pill (Legend) -->
      <div class="mt-3 flex justify-c anim-fadeInDown delay-1">
        <div class="inline-flex items-c gap-2 bg-card rounded-full px-4 py-2 shadow-sm t-xs fw-7 c-dark flex-wrap justify-c">
          <span style="color: var(--adventure-gold);"><i class='bx bxs-circle'></i></span> Misión
          <span style="margin-left:8px; color: var(--creature-forest);"><i class='bx bxs-circle'></i></span> Criaturas
          <span style="margin-left:8px; color: var(--mystery-indigo);"><i class='bx bxs-circle'></i></span> Misterio
        </div>
      </div>
    </div>

    <!-- Map Area -->
    <div class="flex-1 relative" style="background: #E8F5E9; overflow: hidden; height: 100%;">
      <!-- Simulated map background -->
      <svg width="100%" height="100%" style="position: absolute; inset: 0;">
        <path d="M 50 100 Q 150 50 300 200 T 500 150" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="20" stroke-linecap="round"/>
        <path d="M 100 300 Q 250 400 400 250" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="16" stroke-linecap="round"/>
        <path d="M -50 500 Q 200 450 350 600" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="24" stroke-linecap="round"/>
      </svg>
      
      <!-- User Location -->
      <div class="anim-pulse" style="position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%);">
        <div style="width: 24px; height: 24px; background: var(--blue); border: 4px solid white; border-radius: 50%; box-shadow: 0 0 0 8px rgba(75,158,255,0.3);"></div>
      </div>

      <!-- Adventure Pins -->
      <!-- Quest Pin -->
      <div class="map-pin adventure-pin adventure-pin--quest anim-bounceIn delay-2" style="position: absolute; top: 25%; left: 70%;" data-type="quest">
        <i class='bx bx-compass'></i>
      </div>

      <!-- Creature Pin -->
      <div class="map-pin adventure-pin adventure-pin--creature anim-bounceIn delay-3" style="position: absolute; top: 60%; left: 25%;" data-type="creature">
        <i class='bx bxs-leaf'></i>
      </div>

      <!-- Mystery Pin -->
      <div class="map-pin adventure-pin adventure-pin--mystery anim-bounceIn delay-4" style="position: absolute; top: 75%; left: 80%;" data-type="mystery">
        <i class='bx bx-question-mark'></i>
      </div>

      <!-- Selected Pin Info (Hidden by default) -->
      <div id="pin-info" class="card p-4 absolute bottom-0 left-0 w-full anim-slideUp hidden" style="border-radius: var(--r-xl) var(--r-xl) 0 0; margin-bottom: var(--nav-h); z-index: 20;">
        <div class="flex items-c justify-b mb-2">
          <h3 class="t-md fw-8 c-dark" id="pin-title">Punto de Aventura</h3>
          <span class="t-xs fw-7 c-primary">A 120m</span>
        </div>
        <p class="t-sm c-mid mb-4 fw-6" id="pin-desc">Descripción del punto.</p>
        <button class="btn btn-primary w-full" id="pin-btn">Explorar</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <i class='bx bx-home-alt'></i>
      <span>Inicio</span>
    </a>
    <a href="dashboard.html" class="nav-item" id="nav-ranking">
      <i class='bx bx-trophy'></i>
      <span>Ranking</span>
    </a>
    <a href="aventura.html" class="nav-item nav-item--main" id="nav-aventura">
      <i class='bx bx-compass'></i>
      <span>Aventura</span>
    </a>
    <a href="criaturas.html" class="nav-item" id="nav-criaturas">
      <i class='bx bxs-leaf'></i>
      <span>Criaturas</span>
    </a>
    <a href="profile.html" class="nav-item" id="nav-profile">
      <i class='bx bx-user'></i>
      <span>Perfil</span>
    </a>
  </nav>
  </div> <!-- app-container -->

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Map isn't technically a bottom nav tab in the new structure (or maybe it is hidden in 'More').
      // Let's just make it look good.
      EcoApp.initNav('');
      
      const pins = document.querySelectorAll('.map-pin');
      const info = document.getElementById('pin-info');
      const pTitle = document.getElementById('pin-title');
      const pDesc = document.getElementById('pin-desc');
      const pBtn = document.getElementById('pin-btn');

      pins.forEach(pin => {
        pin.addEventListener('click', (e) => {
          e.stopPropagation();
          const type = pin.getAttribute('data-type');
          
          if (type === 'quest') {
            pTitle.innerHTML = "🗺️ Punto de Aventura - Zona Norte";
            pDesc.textContent = "Hay una pista de aventura disponible aquí. Acércate para investigar.";
            pBtn.innerHTML = "<i class='bx bx-compass'></i> Ver Aventura";
            pBtn.onclick = () => location.href = 'aventura.html';
          } else if (type === 'creature') {
            pTitle.innerHTML = "🐾 Estación de Criaturas - Zona Acuática";
            pDesc.textContent = "Escanea aquí para conseguir alimento especial para tus criaturas de agua.";
            pBtn.innerHTML = "<i class='bx bx-qr-scan'></i> Escanear";
            pBtn.onclick = () => location.href = 'index.html';
          } else if (type === 'mystery') {
            pTitle.innerHTML = "❓ Zona Misteriosa - Entrada";
            pDesc.textContent = "Algo extraño está sucediendo en esta zona. Ve para descubrir el secreto.";
            pBtn.innerHTML = "Investigar";
            pBtn.onclick = () => alert("Debes estar más cerca de la zona para investigar.");
          }
          
          info.classList.remove('hidden');
        });
      });
      
      // Tap outside to close
      document.querySelector('.relative').addEventListener('click', () => {
        info.classList.add('hidden');
      });
    });
  </script>
</body>
</html>
