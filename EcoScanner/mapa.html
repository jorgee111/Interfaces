<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mapa Faunia — EcoScanner Adventures</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body style="overflow: hidden;">
  <div class="app-container">

    <div class="page" style="height: 100vh;">
    
    <!-- Floating Header Over Map -->
    <div style="position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: var(--sp-4);">
      <div class="card p-3 flex items-c justify-b shadow-md anim-fadeInDown">
        <button class="btn-ghost" style="border: none; padding: 4px; font-size: 24px;" onclick="history.back()">
          <i class='bx bx-chevron-left' style="color: var(--text-dark);"></i>
        </button>
        <div class="t-base fw-8 c-dark">Mapa Interactivo - Faunia</div>
        <div class="badge-adventure" style="padding: 4px 8px; font-size: 10px;"><i class='bx bxs-circle' style="font-size: 8px;"></i> En vivo</div>
      </div>
      
      <!-- Info Pill (Legend) -->
      <div class="mt-3 flex justify-c anim-fadeInDown delay-1">
        <div class="inline-flex items-c gap-2 bg-card rounded-full px-4 py-2 shadow-sm t-xs fw-7 c-dark flex-wrap justify-c">
          <span style="color: var(--adventure-gold);"><i class='bx bxs-circle'></i></span> Misión
          <span style="margin-left:8px; color: var(--creature-forest);"><i class='bx bxs-circle'></i></span> Criaturas
          <span style="margin-left:8px; color: var(--mystery-indigo);"><i class='bx bxs-circle'></i></span> Misterio
        </div>
      </div>
    </div>

    <!-- Map Area -->
    <div class="flex-1 relative" style="background: #E8F5E9; overflow: hidden; height: 100%;">
      <!-- Simulated Faunia map background -->
      <svg width="100%" height="100%" style="position: absolute; inset: 0;">
        <!-- Paths representing the park paths -->
        <path d="M 30 150 Q 150 50 300 120 T 450 150" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="16" stroke-linecap="round"/>
        <path d="M 120 120 Q 250 300 180 450" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="20" stroke-linecap="round"/>
        <path d="M 300 120 Q 350 350 250 550" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="18" stroke-linecap="round"/>
        <path d="M 180 450 Q 220 500 250 550" fill="none" stroke="rgba(0,201,167,0.2)" stroke-width="14" stroke-linecap="round"/>
      </svg>
      
      <!-- User Location (Simulated) -->
      <div class="anim-pulse" style="position: absolute; top: 70%; left: 45%; transform: translate(-50%, -50%);">
        <div style="width: 20px; height: 20px; background: var(--blue); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 6px rgba(75,158,255,0.3);"></div>
        <div style="position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; white-space: nowrap;">
          Tú estás aquí
        </div>
      </div>

      <!-- Adventure Pins - Faunia Specific -->
      
      <!-- 1. Ecosistema de los Polos -->
      <div class="map-pin adventure-pin adventure-pin--creature anim-bounceIn delay-2" style="position: absolute; top: 15%; left: 35%;" data-type="polos">
        <i class='bx bx-water'></i>
      </div>

      <!-- 2. La Jungla -->
      <div class="map-pin adventure-pin adventure-pin--quest anim-bounceIn delay-3" style="position: absolute; top: 40%; left: 65%;" data-type="jungla">
        <i class='bx bx-compass'></i>
      </div>

      <!-- 3. Bosque Africano -->
      <div class="map-pin adventure-pin adventure-pin--creature anim-bounceIn delay-4" style="position: absolute; top: 50%; left: 25%;" data-type="africano">
        <i class='bx bxs-leaf'></i>
      </div>

      <!-- 4. Sombras Silenciosas -->
      <div class="map-pin adventure-pin adventure-pin--mystery anim-bounceIn delay-5" style="position: absolute; top: 30%; left: 80%;" data-type="sombras">
        <i class='bx bx-question-mark'></i>
      </div>

      <!-- 5. Veneno -->
      <div class="map-pin adventure-pin adventure-pin--mystery anim-bounceIn delay-6" style="position: absolute; top: 80%; left: 30%;" data-type="veneno">
        <i class='bx bx-question-mark'></i>
      </div>

      <!-- 6. Bahía de Steller -->
      <div class="map-pin adventure-pin adventure-pin--quest anim-bounceIn delay-6" style="position: absolute; top: 25%; left: 15%;" data-type="steller">
        <i class='bx bx-compass'></i>
      </div>

      <!-- Selected Pin Info (Hidden by default) -->
      <div id="pin-info" class="card p-4 absolute bottom-0 left-0 w-full anim-slideUp hidden" style="border-radius: var(--r-xl) var(--r-xl) 0 0; margin-bottom: var(--nav-h); z-index: 20; box-shadow: 0 -4px 20px rgba(0,0,0,0.1);">
        <div class="flex items-c justify-b mb-2">
          <h3 class="t-md fw-9 c-dark" id="pin-title">Punto de Aventura</h3>
          <span class="badge-adventure" id="pin-dist">A 120m</span>
        </div>
        <div class="flex items-c gap-2 mb-3">
          <div id="pin-icon-wrap" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white;">
            <i class='bx bx-info-circle'></i>
          </div>
          <span class="t-xs fw-8 uppercase" id="pin-type" style="letter-spacing: 0.5px;">Ecosistema</span>
        </div>
        <p class="t-sm c-mid mb-4 fw-6 line-height-1-5" id="pin-desc">Descripción del punto.</p>
        <div class="flex gap-3">
          <button class="btn btn-secondary flex-1" id="btn-close-pin" style="background: rgba(0,0,0,0.05); color: var(--text-dark); border: none;">Cerrar</button>
          <button class="btn btn-primary flex-1" id="pin-btn">Acción</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Set map as active in nav
      const navs = document.querySelectorAll('.nav-item');
      navs.forEach(n => n.classList.remove('active'));
      const navMap = document.getElementById('nav-map');
      if (navMap) navMap.classList.add('active');
      
      const pins = document.querySelectorAll('.map-pin');
      const info = document.getElementById('pin-info');
      const pTitle = document.getElementById('pin-title');
      const pDesc = document.getElementById('pin-desc');
      const pBtn = document.getElementById('pin-btn');
      const pDist = document.getElementById('pin-dist');
      const pType = document.getElementById('pin-type');
      const pIconWrap = document.getElementById('pin-icon-wrap');
      const btnClose = document.getElementById('btn-close-pin');

      const fauniaZones = {
        'polos': {
          title: "Ecosistema de los Polos",
          type: "Zona de Criaturas",
          color: "var(--creature-ocean)",
          icon: "bx-water",
          dist: "A 180m",
          desc: "Hogar de los pingüinos. Escanea los contenedores de esta zona con forma de iglú para conseguir alimento 'Ice' para tus criaturas de agua.",
          btnText: "<i class='bx bx-qr-scan'></i> Escanear aquí",
          action: () => location.href = 'index.html'
        },
        'jungla': {
          title: "La Jungla Amazónica",
          type: "Misión Activa",
          color: "var(--adventure-gold)",
          icon: "bx-compass",
          dist: "A 50m",
          desc: "Siente el clima tropical. El tucán ha escondido una pista cerca del área de manatíes. Ve a investigar.",
          btnText: "<i class='bx bx-compass'></i> Ver Misión",
          action: () => location.href = 'aventura.html'
        },
        'africano': {
          title: "Bosque Africano",
          type: "Zona de Criaturas",
          color: "var(--creature-forest)",
          icon: "bxs-leaf",
          dist: "A 120m",
          desc: "Los lémures saltan entre los árboles. Hay una Eco-Estación especial aquí que multiplica x2 los puntos de alimento forestal.",
          btnText: "<i class='bx bx-qr-scan'></i> Escanear aquí",
          action: () => location.href = 'index.html'
        },
        'sombras': {
          title: "Sombras Silenciosas",
          type: "Misterio",
          color: "var(--mystery-indigo)",
          icon: "bx-question-mark",
          dist: "A 210m",
          desc: "El noctuario está a oscuras. Se rumorea que una criatura legendaria aparece aquí después de las 18:00 si reciclas correctamente.",
          btnText: "Investigar",
          action: () => alert("Debes estar en el Noctuario para investigar este misterio.")
        },
        'veneno': {
          title: "Pabellón Veneno",
          type: "Misterio",
          color: "var(--mystery-indigo)",
          icon: "bx-question-mark",
          dist: "A 40m",
          desc: "Peligro y belleza. Los cuidadores necesitan ayuda para separar residuos especiales. Misión bloqueada.",
          btnText: "<i class='bx bx-lock'></i> Nivel Insuficiente",
          action: () => {}
        },
        'steller': {
          title: "Bahía de Steller",
          type: "Misión Disponible",
          color: "var(--adventure-gold)",
          icon: "bx-compass",
          dist: "A 300m",
          desc: "¡Es hora de la exhibición de leones marinos! Ayuda a recoger 3 envases en las gradas antes de que empiece.",
          btnText: "<i class='bx bx-compass'></i> Ver Misión",
          action: () => location.href = 'aventura.html'
        }
      };

      pins.forEach(pin => {
        pin.addEventListener('click', (e) => {
          e.stopPropagation();
          const typeId = pin.getAttribute('data-type');
          const data = fauniaZones[typeId];
          
          if (data) {
            pTitle.textContent = data.title;
            pType.textContent = data.type;
            pType.style.color = data.color;
            pIconWrap.style.background = data.color;
            pIconWrap.innerHTML = `<i class='bx ${data.icon}'></i>`;
            pDist.textContent = data.dist;
            pDesc.textContent = data.desc;
            pBtn.innerHTML = data.btnText;
            pBtn.onclick = data.action;
            
            if(data.btnText.includes("Nivel Insuficiente")) {
              pBtn.style.background = "var(--text-muted)";
              pBtn.style.color = "white";
              pBtn.style.border = "none";
            } else {
              pBtn.style.background = data.color;
              pBtn.style.color = "white";
              pBtn.style.border = "none";
            }
          }
          
          info.classList.remove('hidden');
        });
      });
      
      // Tap outside to close
      document.querySelector('.relative').addEventListener('click', () => {
        info.classList.add('hidden');
      });

      btnClose.addEventListener('click', () => {
        info.classList.add('hidden');
      });
    });
  </script>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item" id="nav-home">
        <div class="nav-item-wrap">
          <i class='bx bx-home-alt'></i>
          <span class="nav-badge" id="missions-badge" style="display:none;">3</span>
        </div>
        <span>Inicio</span>
      </a>
      <a href="mapa.html" class="nav-item active" id="nav-map">
        <div class="nav-item-wrap">
          <i class='bx bx-map'></i>
          
        </div>
        <span>Mapa</span>
      </a>
      <a href="escaner.html" class="nav-item" id="nav-escaner">
        <div class="nav-item-wrap">
          <i class='bx bx-qr-scan'></i>
          
        </div>
        <span>Escáner</span>
      </a>
      <a href="criaturas.html" class="nav-item" id="nav-criaturas">
        <div class="nav-item-wrap">
          <i class='bx bxs-leaf'></i>
          
        </div>
        <span>Criaturas</span>
      </a>
      <a href="marketplace.html" class="nav-item" id="nav-marketplace">
        <div class="nav-item-wrap">
          <i class='bx bx-gift'></i>
          
        </div>
        <span>Premios</span>
      </a>
      <a href="patrulla.html" class="nav-item" id="nav-patrulla">
        <div class="nav-item-wrap">
          <i class='bx bx-shield'></i>
          
        </div>
        <span>Patrulla</span>
      </a>
      <a href="profile.html" class="nav-item" id="nav-profile">
        <div class="nav-item-wrap">
          <i class='bx bx-user'></i>
          
        </div>
        <span>Perfil</span>
      </a>
    </nav>
      </div><!-- .app-container -->

  <script>
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2,'0');
      const m = now.getMinutes().toString().padStart(2,'0');
      const el = document.getElementById('status-clock');
      if (el) el.textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
